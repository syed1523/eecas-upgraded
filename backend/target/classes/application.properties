# ── Server ──────────────────────────────────────────────────
server.port=8082

# ── MySQL Database ───────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/expense_db_audit?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectionTimeout=30000
spring.datasource.username=root
spring.datasource.password=syed
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool ──────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.jackson.serialization.fail-on-empty-beans=false

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=aegisExpenseSystemSecretKey2024VeryLongAndSecure
app.jwt.expiration=86400000

# ── Groq API ─────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY}

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads

# ── Circular Reference Fix ───────────────────────────────────
spring.main.allow-circular-references=true
spring.main.allow-bean-definition-overriding=true

# ── SQL Init ─────────────────────────────────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
